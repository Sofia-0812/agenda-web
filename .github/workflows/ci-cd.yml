name: CI/CD Pipeline - Agenda Web (Java + React)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ========================================
  # JOB 1: TESTES DO BACKEND (Java/Spring Boot)
  # ========================================
  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      
      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          
      - name: Executar testes do Backend
        run: mvn test -B

  # ========================================
  # JOB 2: TESTES DO FRONTEND (React)
  # ========================================
  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      
      - name: Configurar Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Instalar dependencias
        run: npm install
        
      - name: Executar testes do Frontend se tiver
        run: npm test -- --watchAll=false --passWithNoTests
        
      - name: Build de producao
        run: npm run build

  # ========================================
  # JOB 3: BUILD & DEPLOY (CD)
  # ========================================
  deploy:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      
      - name: Build das imagens Docker locais
        run: docker compose build
        
      - name: Testes de Aceitacao Integrados (E2E)
        run: |
          docker compose up -d
          sleep 25
          
          # Testa os endpoints do backend desenvolvidos no projeto
          curl -f http://localhost:8080/api/profissionais || exit 1
          curl -f http://localhost:8080/api/atendimentos || exit 1
          curl -f http://localhost:8080/api/exames || exit 1
          
          # Testa a acessibilidade da interface visual
          curl -f http://localhost:3000 || exit 1
          
          docker compose down